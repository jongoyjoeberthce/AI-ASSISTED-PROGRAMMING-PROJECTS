<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retaining Wall Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f5;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #3498db;
        }
        .fs-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }
        .pass { color: #27ae60; }
        .fail { color: #e74c3c; }
        canvas {
            border: 1px solid #dcdde1;
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>Wall Parameters</h2>
        
        <div class="slider-group">
            <label>Stem Height: <span id="valHeight">3.50 m</span></label>
            <input type="range" id="H_stem" min="2.0" max="6.0" step="0.1" value="3.5">
        </div>

        <div class="slider-group">
            <label>Toe Width: <span id="valToe">0.90 m</span></label>
            <input type="range" id="B_toe" min="0.5" max="2.0" step="0.1" value="0.9">
        </div>

        <div class="slider-group">
            <label>Heel Width: <span id="valHeel">2.10 m</span></label>
            <input type="range" id="B_heel" min="1.0" max="4.0" step="0.1" value="2.1">
        </div>

        <div class="results">
            <strong>Live Stability Check</strong><br>
            <small>Assuming Ka=0.33, Soil γ=17 kN/m³, Concrete γ=23.5 kN/m³</small>
            <div id="fsOutput" class="fs-display pass">FS Overturning: 0.00</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="wallCanvas" width="450" height="500"></canvas>
    </div>
</div>

<script>
    // Get references to HTML elements
    const canvas = document.getElementById('wallCanvas');
    const ctx = canvas.getContext('2d');
    
    const sliderH = document.getElementById('H_stem');
    const sliderToe = document.getElementById('B_toe');
    const sliderHeel = document.getElementById('B_heel');
    
    const valH = document.getElementById('valHeight');
    const valToe = document.getElementById('valToe');
    const valHeel = document.getElementById('valHeel');
    const fsOutput = document.getElementById('fsOutput');

    // Fixed Constants
    const t_base = 0.5;   // Base thickness (m)
    const t_stem_bot = 0.4; // Stem bottom thickness (m)
    const t_stem_top = 0.25; // Stem top thickness (m)
    const gamma_s = 17.0; // Soil unit weight
    const gamma_c = 23.5; // Concrete unit weight
    const Ka = 0.33;      // Earth pressure coefficient

    // Drawing scale: 1 meter = 50 pixels
    const SCALE = 50;
    const originX = 50;   // Start drawing 50px from left
    const originY = 400;  // Start drawing near bottom

    function calculateAndDraw() {
        // 1. Get current slider values
        const Hs = parseFloat(sliderH.value);
        const Btoe = parseFloat(sliderToe.value);
        const Bheel = parseFloat(sliderHeel.value);
        
        // Update labels
        valH.innerText = Hs.toFixed(2) + " m";
        valToe.innerText = Btoe.toFixed(2) + " m";
        valHeel.innerText = Bheel.toFixed(2) + " m";

        const Bbase = Btoe + t_stem_bot + Bheel;
        const Htotal = Hs + t_base;

        // 2. Perform Simplified Overturning Calculation (moments about toe)
        // Driving Force (Active Pressure)
        const Pa = 0.5 * Ka * gamma_s * Math.pow(Htotal, 2);
        const M_driving = Pa * (Htotal / 3);

        // Resisting Forces
        const W_base = gamma_c * Bbase * t_base;
        const arm_base = Bbase / 2;

        const W_stem = gamma_c * ((t_stem_bot + t_stem_top) / 2) * Hs;
        const arm_stem = Btoe + (t_stem_bot / 2); // Approximate center of stem

        const W_soil = gamma_s * Bheel * Hs;
        const arm_soil = Btoe + t_stem_bot + (Bheel / 2);

        const M_resisting = (W_base * arm_base) + (W_stem * arm_stem) + (W_soil * arm_soil);

        // Factor of Safety
        const FS = M_resisting / M_driving;
        
        // Update text
        fsOutput.innerText = `FS Overturning: ${FS.toFixed(2)}`;
        if (FS >= 2.0) {
            fsOutput.className = "fs-display pass";
            fsOutput.innerText += " (PASS)";
        } else {
            fsOutput.className = "fs-display fail";
            fsOutput.innerText += " (FAIL)";
        }

        // 3. Draw the canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous frame

        // Draw Soil backfill (brown rect on right side)
        ctx.fillStyle = "rgba(139, 69, 19, 0.2)";
        ctx.fillRect(
            originX + (Btoe + t_stem_bot) * SCALE, 
            originY - (Hs + t_base) * SCALE, 
            Bheel * SCALE + 50, // Extra width to fade off screen
            Hs * SCALE
        );

        // Draw Ground Line
        ctx.beginPath();
        ctx.moveTo(0, originY - t_base * SCALE);
        ctx.lineTo(canvas.width, originY - t_base * SCALE);
        ctx.strokeStyle = "#8b4513";
        ctx.stroke();

        // Draw Concrete Wall
        ctx.fillStyle = "#95a5a6"; // Concrete color
        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 2;

        ctx.beginPath();
        // Start at bottom left of toe
        ctx.moveTo(originX, originY); 
        // Bottom edge to end of heel
        ctx.lineTo(originX + Bbase * SCALE, originY);
        // Up heel back face
        ctx.lineTo(originX + Bbase * SCALE, originY - t_base * SCALE);
        // Left along base to back of stem
        ctx.lineTo(originX + (Btoe + t_stem_bot) * SCALE, originY - t_base * SCALE);
        // Up back of stem
        ctx.lineTo(originX + (Btoe + t_stem_bot) * SCALE, originY - (t_base + Hs) * SCALE);
        // Left across top of stem
        ctx.lineTo(originX + (Btoe + t_stem_bot - t_stem_top) * SCALE, originY - (t_base + Hs) * SCALE);
        // Tapered front face of stem down to base
        ctx.lineTo(originX + Btoe * SCALE, originY - t_base * SCALE);
        // Left along top of toe
        ctx.lineTo(originX, originY - t_base * SCALE);
        // Close shape back to bottom left
        ctx.closePath();
        
        ctx.fill();
        ctx.stroke();
    }

    // Attach event listeners to sliders so it updates when you drag them
    sliderH.addEventListener('input', calculateAndDraw);
    sliderToe.addEventListener('input', calculateAndDraw);
    sliderHeel.addEventListener('input', calculateAndDraw);

    // Initial draw on page load
    calculateAndDraw();
</script>

</body>
</html>
